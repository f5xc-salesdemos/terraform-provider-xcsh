# Reusable workflow for generating Terraform provider documentation
# Called by: on-merge.yml, sync-openapi.yml
name: Generate Documentation

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout'
        type: string
        default: ''
    outputs:
      changed:
        description: 'Whether documentation changed'
        value: ${{ jobs.generate.outputs.changed }}

jobs:
  generate:
    name: Generate Documentation
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Install tfplugindocs
        run: |
          # Retry logic for go install (network-dependent)
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "::group::Install tfplugindocs - Attempt $attempt of $max_attempts"
            if go install github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@v0.24.0; then
              echo "::endgroup::"
              break
            fi
            echo "::endgroup::"
            attempt=$((attempt + 1))
            if [ $attempt -le $max_attempts ]; then
              sleep_time=$((2 ** attempt * 5))
              echo "::warning::go install failed, retrying in ${sleep_time}s..."
              sleep $sleep_time
            fi
          done
          if [ $attempt -gt $max_attempts ]; then
            echo "::error::Failed to install tfplugindocs after $max_attempts attempts"
            exit 1
          fi
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Calculate Terraform version requirements
        run: |
          echo "::group::Calculating minimum Terraform version"
          go run tools/calculate-terraform-version.go --update-templates
          echo "::endgroup::"

      - name: Generate examples
        run: |
          echo "::group::Generating example Terraform files"
          go run tools/generate-examples.go
          echo "::endgroup::"

      - name: Validate generated examples
        run: |
          echo "::group::Validating example Terraform files"
          fail=0
          for dir in examples/resources/f5xc_*; do
            if [ ! -f "$dir/resource.tf" ]; then continue; fi
            tmpdir=$(mktemp -d)
            cp "$dir/resource.tf" "$tmpdir/main.tf"
            cd "$tmpdir"
            terraform init -backend=false -no-color >/dev/null 2>&1
            if ! terraform validate -no-color 2>&1; then
              echo "::error::Validation failed: $dir/resource.tf"
              fail=1
            fi
            cd - >/dev/null
            rm -rf "$tmpdir"
          done
          echo "::endgroup::"
          if [ $fail -eq 1 ]; then exit 1; fi
          echo "All generated examples validated successfully"

      - name: Generate documentation
        run: |
          # Retry logic with exponential backoff for transient network errors
          # tfplugindocs downloads Terraform CLI from HashiCorp's checkpoint API
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "::group::Attempt $attempt of $max_attempts"
            if tfplugindocs generate; then
              echo "Documentation generated successfully"
              echo "::endgroup::"
              break
            fi
            echo "::endgroup::"
            attempt=$((attempt + 1))
            if [ $attempt -le $max_attempts ]; then
              sleep_time=$((2 ** attempt * 5))
              echo "::warning::tfplugindocs failed, retrying in ${sleep_time}s..."
              sleep $sleep_time
            fi
          done
          if [ $attempt -gt $max_attempts ]; then
            echo "::error::All $max_attempts attempts failed"
            exit 1
          fi

      - name: Transform documentation
        run: go run tools/transform-docs.go

      - name: Build provider and export Terraform schema
        run: |
          echo "::group::Building provider and exporting schema"
          go build -o terraform-provider-f5xc .
          mkdir -p /tmp/tf-schema
          cp terraform-provider-f5xc /tmp/tf-schema/
          cat > /tmp/tf-schema/main.tf << 'EOF'
          terraform {
            required_providers {
              f5xc = {
                source  = "f5xc-salesdemos/f5xc"
                version = ">= 0.1.0"
              }
            }
          }
          EOF
          cd /tmp/tf-schema
          TF_PLUGIN_CACHE_DIR="$(pwd)" terraform init -backend=false -no-color >/dev/null 2>&1 || true
          terraform providers schema -json 2>/dev/null > /tmp/tf-schema.json || true
          if [ -s /tmp/tf-schema.json ]; then
            cp /tmp/tf-schema.json "${GITHUB_WORKSPACE}/tools/terraform-schema.json"
            echo "Terraform schema exported: $(wc -c < tools/terraform-schema.json) bytes"
          else
            echo "Warning: Could not export Terraform schema — AI metadata will use default type inference"
          fi
          echo "::endgroup::"

      - name: Generate AI metadata
        run: |
          echo "::group::Generating AI metadata JSON files"
          go run tools/generate-ai-metadata.go
          echo "::endgroup::"

      - name: Validate AI metadata
        run: |
          echo "::group::Validating AI metadata JSON files"
          fail=0
          for f in docs/resources/*.ai.json; do
            if ! python3 -c "import json; json.load(open('$f'))"; then
              echo "::error::Invalid JSON: $f"
              fail=1
            fi
          done
          echo "::endgroup::"
          if [ $fail -eq 1 ]; then exit 1; fi

      - name: Check for changes
        id: check
        run: |
          if [ -n "$(git status --porcelain docs/ examples/)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Documentation changes detected:"
            git status --porcelain docs/ examples/
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No documentation changes"
          fi
